<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Arsip UMPAR</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f4f7;
}

/* HEADER */
.header {
  background: #1f73d2;
  color: #fff;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h2 {
  margin: 0;
  font-size: 18px;
}
.header a {
  background: #ffffff;
  color: #1f73d2;
  padding: 6px 12px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 13px;
  font-weight: bold;
}

/* SEARCH */
.search-box {
  padding: 15px;
}
.search-box input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 25px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* INFO */
.info {
  text-align: center;
  font-size: 13px;
  color: #666;
  margin-bottom: 10px;
}

/* CARD */
.card {
  background: #e9f2fb;
  margin: 12px;
  border-radius: 14px;
  padding: 14px;
}
.card h3 {
  margin: 0 0 6px;
  font-size: 16px;
  color: #0b4fa3;
}
.card p {
  margin: 0 0 12px;
  font-size: 14px;
}

/* BUTTONS */
.btn-group {
  display: flex;
  gap: 10px;
}
.btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  text-decoration: none;
  color: #fff;
  font-weight: bold;
  font-size: 14px;
}
.btn.open {
  background: #2196f3;
}
.btn.download {
  background: #2e7d32;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>ARSIP UMPAR</h2>
  <a href="https://drive.google.com/drive/folders/1qz-qpqDW8PtlC2xOwzTGSko4jsZ234wb" target="_blank">
    Arsip Sebelum 26/02/2026
  </a>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input
    type="text"
    id="searchInput"
    placeholder="🔍 Cari nama pegawai (scan semua arsip)">
</div>

<div class="info">
  Menampilkan semua arsip (berdasarkan waktu upload)
</div>

<!-- LIST -->
<div id="listArsip"></div>

<script>
/* =============================
   URL GAS
============================= */
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbwdFKajGUWgk0vpj_hKcxcWQ0x2o95QpJBOe9u6g30YdC6YiiWW7w07_qbh854s7hbH/exec?action=getAllArsip";

let arsipData = [];

/* LOAD DATA */
fetch(GAS_URL)
  .then(res => res.json())
  .then(data => {
    arsipData = data;   // SEMUA DATA, TANPA BATAS
    renderList(arsipData);
  })
  .catch(err => {
    document.getElementById("listArsip").innerHTML =
      "<p style='text-align:center;color:red'>Gagal memuat data</p>";
    console.error(err);
  });

/* RENDER CARD */
function renderList(data) {
  const list = document.getElementById("listArsip");
  list.innerHTML = "";

  if (!data || data.length === 0) {
    list.innerHTML =
      "<p style='text-align:center'>Data tidak ditemukan</p>";
    return;
  }

  data.forEach(d => {
    list.innerHTML += `
      <div class="card">
        <h3>${d.nama}</h3>
        <p>Jenis: ${d.jenis}</p>
        <div class="btn-group">
          <a class="btn open" href="${d.link}" target="_blank">📄 Buka</a>
          <a class="btn download" href="${d.link}" download>⬇ Download</a>
        </div>
      </div>
    `;
  });
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", function () {
  const q = this.value.toLowerCase();
  const hasil = arsipData.filter(d =>
    d.nama.toLowerCase().includes(q)
  );
  renderList(hasil);
});
</script>

</body>
</html>
