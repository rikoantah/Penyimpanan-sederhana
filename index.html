<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Arsip Pegawai RSDS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fa;
}
.container {
  max-width: 900px;
  margin: 40px auto;
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,.08);
}
h2 {
  margin-bottom: 20px;
}
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid #ccc;
}
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 12px;
  border-bottom: 1px solid #ddd;
  text-align: left;
}
th {
  background: #f0f2f5;
}
a.btn {
  padding: 6px 12px;
  background: #1f73d2;
  color: #fff;
  text-decoration: none;
  border-radius: 6px;
  font-size: 14px;
  margin-right: 6px;
}
a.btn.download {
  background: #28a745;
}
</style>
</head>

<body>

<div class="container">
  <h2>📂 Arsip Pegawai RSDS</h2>

  <input list="namaList" id="searchNama" placeholder="Cari nama pegawai...">
  <datalist id="namaList"></datalist>

  <table>
    <thead>
      <tr>
        <th>Nama</th>
        <th>Jenis Arsip</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="3">Memuat data...</td></tr>
    </tbody>
  </table>
</div>

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbwftMDh3YEkaSCUHldVlSsZUEkf_4j-PvepIdy9Mdh836yCB5r79rZuWDiDt0PBZIhBkA/exec";

let arsipData = [];

/* LOAD DATA DARI GAS */
fetch(GAS_URL)
  .then(res => res.json())
  .then(data => {
    arsipData = data;
    renderTable(data);
    isiAutocomplete(data);
  });

/* AUTOCOMPLETE NAMA */
function isiAutocomplete(data) {
  const list = document.getElementById("namaList");
  [...new Set(data.map(d => d.nama))].forEach(nama => {
    const opt = document.createElement("option");
    opt.value = nama;
    list.appendChild(opt);
  });
}

/* RENDER TABEL */
function renderTable(data) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  if (data.length === 0) {
    tbody.innerHTML =
      `<tr><td colspan="3">Data tidak ditemukan</td></tr>`;
    return;
  }

  data.forEach(d => {
    tbody.innerHTML += `
      <tr>
        <td>${d.nama}</td>
        <td>${d.jenis}</td>
        <td>
          <a class="btn" href="${d.link}" target="_blank">Lihat</a>
          <a class="btn download" href="${d.link}" download>Download</a>
        </td>
      </tr>
    `;
  });
}

/* FILTER BY NAMA */
document.getElementById("searchNama").addEventListener("input", function () {
  const keyword = this.value.toLowerCase();
  const hasil = arsipData.filter(d =>
    d.nama.toLowerCase().includes(keyword)
  );
  renderTable(hasil);
});
</script>

</body>
</html>
